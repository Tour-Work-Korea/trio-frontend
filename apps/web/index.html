    <style>
      html,
      body {
        width: 100%;
        min-height: var(--trio-vh, 100dvh);
        height: var(--trio-vh, 100dvh);
        margin: 0;
      }

      body {
        display: flex;
        overflow: hidden;
        background: #f7f8fa;
      }

      #root {
        display: flex;
        flex: 1;
        width: 100%;
        min-height: var(--trio-vh, 100dvh);
        height: var(--trio-vh, 100dvh);
      }

      * {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function setViewportHeight() {
          var visualViewport = window.visualViewport;
          var height =
            visualViewport && visualViewport.height
              ? visualViewport.height
              : window.innerHeight;
          var isMobileWeb =
            window.matchMedia &&
            window.matchMedia('(hover: none) and (pointer: coarse)').matches;
          var topOffset =
            visualViewport && Number.isFinite(visualViewport.offsetTop)
              ? visualViewport.offsetTop
              : 0;
          var mobileTopInset = isMobileWeb ? 12 : 0;

          document.documentElement.style.setProperty(
            '--trio-vh',
            height + 'px',
          );
          document.documentElement.style.setProperty(
            '--trio-safe-area-top',
            Math.max(topOffset, mobileTopInset) + 'px',
          );
        }

        setViewportHeight();
        window.addEventListener('resize', setViewportHeight);
        window.addEventListener('orientationchange', setViewportHeight);

        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setViewportHeight);
          window.visualViewport.addEventListener('scroll', setViewportHeight);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
